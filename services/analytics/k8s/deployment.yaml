apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: ihp
  labels:
    app: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          # Replaced by CI with the real ECR image URI + tag on each deploy
          image: REPLACED_BY_CI
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: analytics-db-credentials # populated by External Secrets Operator from Secrets Manager
            - secretRef:
                name: jwt-signing-key # same secret the auth service signs with
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
