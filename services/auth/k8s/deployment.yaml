apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: ihp
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: REPLACED_BY_CI
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: auth-db-credentials
            - secretRef:
                name: jwt-signing-key # shared across ALL services — same secret name/key mounted everywhere
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
